<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d00" />
      <stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121212" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background panel -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)" stroke="url(#primaryGrad)" stroke-width="1.5" />
  
  <!-- Orbit rings mimicking the hero background -->
  <circle cx="50" cy="50" r="38" stroke="url(#primaryGrad)" stroke-width="1" stroke-dasharray="14 10" fill="none" opacity="0.4" />
  <circle cx="50" cy="50" r="30" stroke="url(#primaryGrad)" stroke-width="2" stroke-dasharray="24 12" fill="none" opacity="0.8" />
  
  <!-- MC Emblem with glow -->
  <g transform="translate(14, 28)" filter="url(#glow)">
    <path d="M 0,44 V 0 L 18,18 L 36,0 V 44" stroke="url(#primaryGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M 64,5 A 17 17 0 1 0 64,39" stroke="url(#primaryGrad)" stroke-width="6.5" stroke-linecap="round" fill="none" />
    <path d="M 36,22 H 47" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-dasharray="2 3" fill="none" />
  </g>
</svg>
