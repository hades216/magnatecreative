    <!-- Defensive Shield against window.ethereum redefinition conflicts caused by multiple crypto wallet extensions -->
    <script>
      (function() {
        try {
          var _eth = window.ethereum;
          Object.defineProperty(window, 'ethereum', {
            get: function() { return _eth; },
            set: function(val) { _eth = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.debug('Protected window.ethereum from injection conflict.');
        }

        window.addEventListener('error', function(event) {
          if (event && event.message && (
            event.message.indexOf('ethereum') !== -1 || 
            event.message.indexOf('Cannot redefine property') !== -1
          )) {
            event.stopImmediatePropagation();
            console.warn('Intercepted and suppressed browser extension exception:', event.message);
          }
        }, true);
      })();
    </script>
